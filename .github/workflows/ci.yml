# All jobs run on plain GitHub runners with no hardware: the Zephyr job
# builds and runs twister on native_sim only (testcase.yaml keeps board
# targets out of integration_platforms). The Zephyr and Rust jobs need the
# pinned synapse_fbs release published (C tarball asset and crate) to go
# green.
name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read
  id-token: write

jobs:
  nix:
    name: Nix flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Check flake
        run: nix flake check

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Rust formatting
        run: nix develop -c cargo fmt --check --manifest-path rust/Cargo.toml
      - name: C formatting
        run: nix develop -c clang-format --dry-run -Werror zephyr/src/*.c zephyr/include/csyn/*.h zephyr/tests/csyn/basic/src/*.c

  rust:
    name: Rust CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('flake.lock', 'rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Lint
        run: nix develop -c cargo clippy --locked --manifest-path rust/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: nix develop -c cargo test --locked --manifest-path rust/Cargo.toml

  zephyr:
    name: Zephyr module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: modules/lib/csyn
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            .west
            zephyr
            modules/lib/zros
          key: ${{ runner.os }}-west-${{ hashFiles('modules/lib/csyn/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-west-
      - name: Cache Twister outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zephyr
            modules/lib/csyn/twister-out
          key: ${{ runner.os }}-twister-${{ hashFiles('modules/lib/csyn/flake.lock', 'modules/lib/csyn/west.yml', 'modules/lib/csyn/zephyr/**/*') }}
          restore-keys: |
            ${{ runner.os }}-twister-
      - name: Set up Zephyr workspace
        run: |
          if [ ! -d .west ]; then
            nix develop ./modules/lib/csyn -c west init -l modules/lib/csyn
          else
            nix develop ./modules/lib/csyn -c west config manifest.path modules/lib/csyn
          fi
          nix develop ./modules/lib/csyn -c west update
      - name: Twister tests
        working-directory: modules/lib/csyn
        run: nix develop -c west twister -T zephyr/tests -v --inline-logs --integration
