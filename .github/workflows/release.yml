name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  crates-io:
    name: Publish Rust crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: true
          use-flakehub: false
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('flake.lock', 'rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must match vMAJOR.MINOR.PATCH, got ${tag}"
            exit 1
          fi

          crate_version="$(
            nix develop -c python - <<'PY'
import tomllib
from pathlib import Path

data = tomllib.loads(Path("rust/Cargo.toml").read_text())
print(data["package"]["version"])
PY
          )"
          tag_version="${tag#v}"

          if [[ "${crate_version}" != "${tag_version}" ]]; then
            echo "::error::Tag ${tag} does not match rust/Cargo.toml version ${crate_version}"
            exit 1
          fi
      - name: Check flake
        run: nix flake check
      - name: Rust formatting
        run: nix develop -c cargo fmt --check --manifest-path rust/Cargo.toml
      - name: Rust lint
        run: nix develop -c cargo clippy --locked --manifest-path rust/Cargo.toml --all-targets -- -D warnings
      - name: Rust tests
        run: nix develop -c cargo test --locked --manifest-path rust/Cargo.toml
      - name: Package dry run
        run: nix develop -c cargo publish --locked --dry-run --manifest-path rust/Cargo.toml
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN repository secret is required"
            exit 1
          fi

          nix develop -c cargo publish --locked --manifest-path rust/Cargo.toml
