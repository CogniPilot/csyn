#
# CI workspace manifest: lets csyn act as its own west manifest repository so
# the module's twister tests build against pinned dependencies on a plain
# GitHub runner (native_sim only, no hardware, no cross toolchains).
# Vehicles consume csyn through their own manifests; nothing imports this one.

manifest:
  self:
    path: modules/lib/csyn

  remotes:
    - name: cognipilot
      url-base: https://github.com/CogniPilot

  projects:
    - name: zephyr
      remote: cognipilot
      revision: c908d12ebc2baa679d0f5b8e31eeb459ea93caff
      path: zephyr
      import: false
    - name: zros
      remote: cognipilot
      revision: 959bce412d6e12b3a49fb8b55c219affcf7f6d0e
      path: modules/lib/zros
